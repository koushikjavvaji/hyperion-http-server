<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404 - Hyperion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        .code {
            font-size: 120px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .message {
            font-size: 20px;
            color: #555;
            margin-top: 16px;
        }

        a {
            display: inline-block;
            margin-top: 32px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="code">404</div>
        <div class="message">Page not found</div>
        <a href="/">← Back to home</a>
    </div>
</body>

</html>
